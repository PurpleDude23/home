<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeremiah Conan | Hub</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #00ff41; /* Matrix green or choose your own */
            --gray: #2a2a2a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid var(--gray);
            padding: 2rem;
            max-width: 400px;
            width: 90%;
        }
        h1 { font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 0.5rem; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
        .links { display: flex; flex-direction: column; gap: 1rem; }
        .link-card {
            border: 1px solid var(--gray);
            padding: 1rem;
            text-decoration: none;
            color: var(--text);
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .link-card:hover {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }
        .footer { margin-top: 3rem; font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>

    <div class="container">
        <h1>JEREMIAH CONAN</h1>
        <p>REDACTED // CREATIVE DIRECTORY</p>

        <div class="links">
            <a href="https://purpledude23.github.io/genesyn" class="link-card">Project Genesyn</a>
            <a href="https://jeremiahcu.bandcamp.com" class="link-card">Music</a>
            <a href="https://youtube.com/@jeremiahcu" class="link-card">Youtube</a>
            <a href="mailto:your-jeremiahuthoff@gmail.com" class="link-card">Email</a>
        </div>
    </div>

    <div class="footer">
        © 2026 // ALL RIGHTS RESERVED
    </div>

</body>
</html>
